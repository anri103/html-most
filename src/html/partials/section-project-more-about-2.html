<section class="section section-project-more-about-2 @@if(bgGradient){bg-gradient-dark}">
    <div class="container">

        <div class="row gy-4 align-items-center">

            <div class="col-lg-12">
                <!-- image -->
                <img class="img-fluid w-100" src="@@sectionImg" alt="">
            </div>

            <div class="col-lg-12 @@if(textOnLeft){order-lg-first}">
                <!-- header -->
                <div class="section-project-more-about-2__header">
                    <div class="h3">@@title</div>
                    <div class="section__subtitle">@@subtitle</div>
                </div>
            </div>

        </div>

    </div>
</section>
